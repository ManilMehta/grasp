<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grasp</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0e14;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #e6e6e6;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #viewport {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        width: 260px;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(4px);
        pointer-events: none;
        user-select: none;
      }
      #overlay {
        display: block;
        width: 100%;
        height: auto;
      }
      #readout {
        padding: 8px 10px;
        font-size: 11px;
        line-height: 1.5;
        white-space: pre;
      }
      #title {
        position: fixed;
        top: 16px;
        left: 16px;
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.7;
        pointer-events: none;
      }
      #toolbar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 8px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(6px);
        z-index: 10;
      }
      .tool-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        font: inherit;
        font-size: 12px;
        color: #cbd5e1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }
      .tool-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .tool-btn.active {
        color: #0b0e14;
        background: #6ee7b7;
        border-color: #6ee7b7;
      }
      .tool-btn.reset {
        color: #fca5a5;
      }
      .tool-btn.reset:hover {
        color: #0b0e14;
        background: #fca5a5;
      }
      .tool-key {
        font-size: 10px;
        opacity: 0.6;
        border: 1px solid currentColor;
        border-radius: 4px;
        padding: 0 4px;
        line-height: 1.4;
      }
      #hint {
        position: fixed;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        opacity: 0.65;
        pointer-events: none;
        z-index: 10;
      }
      #status {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 14px;
        max-width: 360px;
        line-height: 1.6;
        opacity: 0.85;
      }
      #status button {
        margin-top: 14px;
        font: inherit;
        color: #0b0e14;
        background: #6ee7b7;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        cursor: pointer;
      }
      #status.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="viewport"></canvas>
    </div>

    <div id="title">grasp</div>

    <div id="toolbar"></div>
    <div id="hint"></div>

    <div id="hud">
      <canvas id="overlay" width="320" height="240"></canvas>
      <div id="readout">initializing...</div>
    </div>

    <div id="status">
      <div id="status-text">grasp needs your camera to read hand gestures.</div>
      <button id="start-btn">Start camera</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
